<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vivid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f7;
      color: #222;
    }

    h2 {
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .top-bar input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 140px;
    }

    .actions {
      margin-bottom: 20px;
    }

    .actions button {
      padding: 6px 10px;
      margin-right: 6px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .cal-cell {
      background: #fff;
      border: 1px solid #ddd;
      padding: 8px;
      min-height: 80px;
    }

    .day-num {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .day-text {
      width: 100%;
      height: 50px;
      border: none;
      outline: none;
      resize: none;
      font-size: 12px;
    }

    #assets-wrap img {
      width: 200px;
      margin: 10px 10px 0 0;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <h2>Vivid</h2>

  <!-- INPUTS -->
  <div class="top-bar">
    <input id="i-brand" placeholder="Brand">
    <input id="i-ind" placeholder="Industry">
    <input id="i-obj" placeholder="Objective">
    <input id="i-aud" placeholder="Audience">
    <input id="i-tone" placeholder="Tone">
  </div>

  <!-- BUTTONS -->
  <div class="actions">
    <button>Generate Strategy</button>
    <button>Generate Calendar</button>
    <button>Generate Assets</button>
  </div>

  <!-- STRATEGY -->
  <h3>Strategy</h3>
  <div id="out-strategy"></div>

  <!-- CALENDAR -->
  <h3>Calendar</h3>
  <div id="calendar">
    <!-- 30 days -->
    <div class="cal-cell" data-day="1"></div>
    <div class="cal-cell" data-day="2"></div>
    <div class="cal-cell" data-day="3"></div>
    <div class="cal-cell" data-day="4"></div>
    <div class="cal-cell" data-day="5"></div>
    <div class="cal-cell" data-day="6"></div>

    <div class="cal-cell" data-day="7"></div
