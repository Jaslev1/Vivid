<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivid</title>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --line:#e6e6ea;
  --text:#111;
  --muted:#6b7280;
  --accent:#1e1b3a;
}

*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}

.nav{
  position:sticky; top:0; z-index:10;
  background:#fff; border-bottom:1px solid var(--line);
  padding:14px 18px; font-weight:700; letter-spacing:.2px;
}

.container{max-width:1160px;margin:18px auto;padding:0 12px}

.inputs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.inputs input{
  padding:10px 10px;border:1px solid var(--line);border-radius:8px;min-width:160px;background:#fff
}

.actions{margin-bottom:10px}
.actions button{
  padding:10px 12px;margin-right:6px;border:1px solid var(--line);
  background:#fff;border-radius:8px;cursor:pointer
}

.section{margin-top:18px}
.section h3{margin:0 0 10px 0}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px
}

/* Strategy */
#strategy .block{margin-bottom:10px}
#strategy .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}

/* Calendar */
#calendar{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.cal-cell{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:10px;min-height:110px;cursor:pointer;display:flex;flex-direction:column;gap:6px
}
.day-num{font-size:12px;color:var(--muted)}
.day-prev{font-size:13px;line-height:1.3;white-space:pre-wrap}

/* Assets */
#assets{display:flex;flex-wrap:wrap}
.asset{
  width:260px;background:#fff;border:1px solid var(--line);border-radius:12px;
  overflow:hidden;margin:10px
}
.asset img{width:100%;display:block}
.asset .cap{padding:10px;font-size:13px}

/* Modal */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center
}
.modal-inner{
  width:520px;background:#fff;border-radius:12px;padding:16px
}
.modal-inner textarea{
  width:100%;height:140px;border:1px solid var(--line);border-radius:8px;padding:10px
}
.modal-actions{margin-top:10px;text-align:right}
.modal-actions button{
  padding:8px 10px;border:1px solid var(--line);background:#fff;border-radius:8px;margin-left:6px;cursor:pointer
}
</style>
</head>

<body>
<div class="nav">Vivid</div>

<div class="container">

  <div class="inputs">
    <input id="brand" placeholder="Brand" />
    <input id="industry" placeholder="Industry" />
    <input id="objective" placeholder="Objective" />
    <input id="audience" placeholder="Audience" />
    <input id="tone" placeholder="Tone" />
  </div>

  <div class="actions">
    <button onclick="genStrategy()">Generate Strategy</button>
    <button onclick="genCalendar()">Generate Calendar</button>
    <button onclick="genAssets()">Generate Assets</button>
  </div>

  <div class="section">
    <h3>Strategy</h3>
    <div id="strategy" class="card"></div>
  </div>

  <div class="section">
    <h3>Calendar</h3>
    <div id="calendar"></div>
  </div>

  <div class="section">
    <h3>Assets</h3>
    <div id="assets"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="label">Edit day</div>
    <textarea id="modalText"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Close</button>
      <button onclick="saveDay()">Save</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
