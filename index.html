<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vivid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body { margin:0; font-family: Arial, sans-serif; }
.top-bar { display:flex; gap:10px; padding:12px; }
.actions { padding:12px; }
.page { padding:12px 12px 0 12px; }

#calendar {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

.cal-cell {
  border:1px solid #ddd;
  padding:8px;
  min-height:80px;
  cursor:pointer;
}

.day-num { font-size:12px; color:#666; }

#assets-wrap img {
  width:220px;
  margin:10px;
}
</style>
</head>

<body>

<h2 style="padding:12px;">Vivid</h2>

<div class="top-bar">
  <input id="i-brand" placeholder="Brand">
  <input id="i-ind" placeholder="Industry">
  <input id="i-obj" placeholder="Objective">
  <input id="i-aud" placeholder="Audience">
  <input id="i-tone" placeholder="Tone">
</div>

<div class="actions">
  <button onclick="generateStrategy()">Generate Strategy</button>
  <button onclick="generateCalendar()">Generate Calendar</button>
  <button onclick="generateAssets()">Generate Assets</button>
</div>

<h3 style="padding:12px;">Strategy</h3>
<div id="out-strategy" style="padding:12px;"></div>

<h3 style="padding:12px;">Calendar</h3>
<div id="calendar"></div>

<h3 style="padding:12px;">Assets</h3>
<div id="assets-wrap"></div>

<script src="./app.js"></script>

</body>
</html>
